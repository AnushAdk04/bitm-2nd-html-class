<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List and Nested List</title>
</head>
<body>
    Ordered list:
    <ol type="I">
        <li>CSIT</li>
        <li>BITM</li>
        <li>BCA</li>
    </ol>

    Unordered list:
    <ul type="square">
        <li>CSIT</li>
        <li>BITM</li>
        <li>BCA</li>
    </ul>

    Nested List:
    <h2>Cafe Menu</h2>
    <ol>
        <li>Hot Drinks
            <ol type="a">
                <li>Cappuchino</li>
                <li>Coffee</li>
            </ol>
        </li>
        <li>Cold Drinks
            <ul type="square">
                <li>Iced Latte</li>
                <li>Milkshake</li>
            </ul>
        </li>
    </ol>
</body>
</html>
